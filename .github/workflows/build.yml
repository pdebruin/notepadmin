name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore v1/src/Notepadmin/Notepadmin.csproj

      - name: Build
        run: dotnet build v1/src/Notepadmin/Notepadmin.csproj -c Release --no-restore

      - name: Publish linux-x64
        run: dotnet publish v1/src/Notepadmin/Notepadmin.csproj -c Release -r linux-x64 -o publish/linux-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: notepadmin-linux-x64
          path: publish/linux-x64/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish linux-x64
        run: dotnet publish v1/src/Notepadmin/Notepadmin.csproj -c Release -r linux-x64 -o publish/linux-x64

      - name: Create tarball
        run: tar -czf notepadmin-linux-x64.tar.gz -C publish/linux-x64 .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: notepadmin-linux-x64.tar.gz
          generate_release_notes: true
